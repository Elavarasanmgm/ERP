version: '3.8'

services:
  # Backend API Service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DB_SERVER: 68.220.186.41
      DB_DATABASE: ERPSolution
      DB_USER: webRW
      DB_PASSWORD: AdminDev2026
      DB_PORT: 1433
      DB_ENCRYPT: false
      DB_TRUST_CERT: false
      JWT_SECRET: your_jwt_secret_key
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - erp-network
    restart: unless-stopped

  # Frontend Service
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - erp-network
    restart: unless-stopped

  # SQL Server Database (Optional - for development)
  # Note: MS SQL Server requires Windows or special Docker setup
  # For development, you can connect to your local SQL Server instance
  # For production, consider using Azure SQL Database

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - erp-network
    restart: unless-stopped

networks:
  erp-network:
    driver: bridge

volumes:
  db-data:
